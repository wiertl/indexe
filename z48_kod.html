<textarea cols="90" rows="24">
<!DOCTYPE html>   
<head>    
<title>Jakubiak 3K</title>    
<meta charset="utf-8">   
</head>  
<body> 
<div style="color:red;font-size:50px;"> 
<script language="JavaScript"> 
do { 
    var liczba1 = prompt("wysokość=",""); 
    var h_jak = parseFloat(liczba1);      
} 
while (h_jak <= 0); 

do { 
    var liczba1 = prompt("podstawę=",""); 
    var a_jak = parseFloat(liczba1);      
} 
while (!(a_jak > 0)); 

var Pole_jak = a_jak * h_jak / 2; 

document.write("Pole=" + Pole_jak.toFixed(2) + " cm^2" + "<br>"); 
</script> 
</div> 
</body> 
</html>
</textarea>
