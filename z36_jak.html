<!DOCTYPE html>
<html lang="pl-PL">
<head>
    <meta charset="UTF-8">
    <title> Jakubiak 3K</title>
</head>
<body>

<script>
var x = prompt("Podaj liczbę:", "");
var a_dana_jak = parseInt(x);

document.write("Wczytana liczba: " + a_dana_jak + "<br>");

if(a_dana_jak % 2 == 0)
{
    document.write("<font color='red' size='3'>liczba jest parzysta</font><br>");
}
else
{
    document.write("<font color='silver' size='5'>liczba jest nieparzysta</font><br>");
}
</script>

</body>
</html>
