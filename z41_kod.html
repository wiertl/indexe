<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="utf-8">
<title> Jakubiak 3K </title>

</head>

<body>
<label for="a">Podaj pierwszą liczbę:</label>
<input type="number" id="a">
<br><br>

<label for="b">Podaj drugą liczbę:</label>
<input type="number" id="b">
<br><br>

<input type="button" value="DODAWANIE" onclick="suma_jak()">
<input type="button" value="ODEJMOWANIE" onclick="roznica_jak()">
<input type="button" value="MNOŻENIE" onclick="iloczyn_jak()">
<input type="button" value="DZIELENIE" onclick="iloraz_jak()">
<input type="button" value="TEORIA-Macholla" onclick="teoria_jak()">

<div id="wynik" style="margin-top:20px;"></div>

<script>

function suma_jak()
{
var a = document.getElementById("a").value;
var b = document.getElementById("b").value;

if (a == "" || b == "")
{
document.getElementById("wynik").innerHTML = "Proszę uzupełnić obie liczby.";
}
else
{
a = parseFloat(a);
b = parseFloat(b);
var suma = a + b;
document.getElementById("wynik").innerHTML = "Wynik działania wynosi: " + suma.toFixed(2);
}
}

function roznica_jak()
{
var a = document.getElementById("a").value;
var b = document.getElementById("b").value;

if (a == "" || b == "")
{
document.getElementById("wynik").innerHTML = "Proszę uzupełnić obie liczby.";
}
else
{
a = parseFloat(a);
b = parseFloat(b);
var roznica = a - b;
document.getElementById("wynik").innerHTML = "Wynik działania wynosi: " + roznica.toFixed(2);
}
}

function iloczyn_jak()
{
var a = document.getElementById("a").value;
var b = document.getElementById("b").value;

if (a == "" || b == "")
{
document.getElementById("wynik").innerHTML = "Proszę uzupełnić obie liczby.";
}
else
{
a = parseFloat(a);
b = parseFloat(b);
var iloczyn = a * b;
document.getElementById("wynik").innerHTML = "Wynik działania wynosi: " + iloczyn.toFixed(2);
}
}

function iloraz_jak()
{
var a = document.getElementById("a").value;
var b = document.getElementById("b").value;

if (a == "" || b == "")
{
document.getElementById("wynik").innerHTML = "Proszę uzupełnić obie liczby.";
}
else
{
a = parseFloat(a);
b = parseFloat(b);

if (b == 0)
{
document.getElementById("wynik").innerHTML = "Nie wolno dzielić przez zero.";
}
else
{         
var iloraz = a / b; 
document.getElementById("wynik").innerHTML = "Wynik działania wynosi: " + iloraz; 
} 
} 
} 
</script> 
</body> 
</html>
