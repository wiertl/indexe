<!DOCTYPE html>
<html lang="pl-PL">
<head>
    <meta charset="UTF-8">
    <title> Jakubiak 3k </title>
</head>
<body>

<h2 style="color:green;">MENU:</h2>
<p style="color:red;">1 - CZERWONY</p>
<p style="color:blue;">2 - NIEBIESKI</p>

<input type="button" value="Oblicz" onclick="fun_jak()" />

<script>
function fun_jak() {
    var opcja_dana_jak = prompt("Podaj kolor (1,2 lub nazwa):", "");

    if(opcja_dana_jak == 1 || opcja_dana_jak.toLowerCase() == "czerwony")
    {
        document.write("<font color='red' size='7'>wczytałeś kolor czerwony</font><br>");
    }
    else if(opcja_dana_jak == 2 || opcja_dana_jak.toLowerCase() == "niebieski")
    {
        document.write("<font color='blue' size='1'>wczytałeś kolor niebieski</font><br>");
    }
    else
    {
        document.write("Niepoprawny wybór");
    }
}
</script>

</body>
</html>
