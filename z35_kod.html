<textarea cols="90" rows="24">
<!DOCTYPE html>
<html lang="pl-PL">
<head>
    <meta charset="UTF-8">
    <title> Jakubiak 3K</title>
</head>
<body>

<div style="color:red;font-size:50px;">
<script>
var x = prompt("podaj liczbę x=","");
var a_dana_jak = parseFloat(x);

document.write("czytana liczba x = " + a_dana_jak + "<br>");

if(a_dana_jak > 0)
{
    document.write("liczba jest dodatnia<br>");
}
if(a_dana_jak == 0)
{
    document.write("liczba jest równa 0<br>");
}
if(a_dana_jak < 0)
{
    document.write("liczba jest ujemna<br>");
}
</script>
</div>

</body>
</html>
</textarea>
